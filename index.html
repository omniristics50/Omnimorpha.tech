<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Omnimorpha | Private Development</title>

<style>
body{
background:#000;
color:#d4af37;
font-family:Arial, Helvetica, sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
text-align:center;
}

.container{
max-width:700px;
}

h1{
font-size:50px;
letter-spacing:4px;
margin-bottom:10px;
}

p{
font-size:18px;
opacity:.8;
}

.lock{
font-size:70px;
margin-bottom:20px;
}
</style>

<script>
/* GLOBAL SITE LOCK */
const siteLocked = true;

if(siteLocked){

const allowedPages = ["index.html"];

let currentPage = window.location.pathname.split("/").pop();

if(!allowedPages.includes(currentPage)){
window.location.href="/";
}

}
</script>

</head>

<body>

<div class="container">

<div class="lock">🔒</div>

<h1>OMNIMORPHA</h1>

<p>This site is temporarily locked during private development.</p>

<p>Access will reopen once the platform is ready.</p>

</div>

</body>
</html>
