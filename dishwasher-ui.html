<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>OmniClean™ Dishwasher UI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: Arial, Helvetica, sans-serif;
  background:#0e0e11;
  color:#eee;
  padding:30px;
}

.panel{
  background:#18181d;
  padding:20px;
  border-radius:8px;
  margin-bottom:20px;
}

label{
  display:block;
  margin-top:10px;
}

select,button{
  padding:8px;
  margin-top:6px;
}

.kpi{
  font-size:26px;
  margin-top:10px;
}

.bar{
  height:12px;
  background:#333;
  border-radius:6px;
  overflow:hidden;
  margin-top:6px;
}

.bar span{
  display:block;
  height:100%;
  background:#e8b24c;
  width:0%;
}

#log{
  font-size:13px;
  max-height:150px;
  overflow:auto;
  background:#111;
  padding:10px;
}
</style>

</head>

<body>

<h2>OmniClean™ Dishwasher UI</h2>

<div class="panel">
<label>Mode</label>
<select id="washMode">
<option value="eco">Eco</option>
<option value="normal" selected>Standard</option>
<option value="intensive">Intensive</option>
<option value="glass">Glass</option>
<option value="ai">AI Adaptive</option>
</select>

<label>Load</label> <select id="loadSize">

<option value="light">Light</option>
<option value="medium" selected>Mixed</option>
<option value="heavy">Heavy</option>
</select>

<br><br> <button id="cycleStart">Start Cycle</button> <button id="cycleStop">Stop</button> <button id="memReset">Reset Memory</button>

</div>

<div class="panel">
<div>Cleaning Performance Index</div>
<div class="kpi"><span id="cpiNow">—</span>%</div>
<div id="cpiBand">Idle</div>
</div>

<div class="panel">
<div>Soil Level</div>
<div id="soilNow">—</div>
<div class="bar"><span id="soilBar"></span></div>
</div>

<div class="panel">
<div>Adaptive Decisions Log</div>
<div id="log"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", ()=>{

const cpiNow = document.getElementById("cpiNow");
const cpiBand = document.getElementById("cpiBand");
const soilNow = document.getElementById("soilNow");
const soilBar = document.getElementById("soilBar");

const washMode = document.getElementById("washMode");
const loadSize = document.getElementById("loadSize");

const startBtn = document.getElementById("cycleStart");
const stopBtn = document.getElementById("cycleStop");
const resetBtn = document.getElementById("memReset");

const log = document.getElementById("log");

let cycleActive=false;
let soil=80;
let timer=null;

function logLine(msg){
 const d=document.createElement("div");
 d.textContent=new Date().toLocaleTimeString()+"  "+msg;
 log.prepend(d);
}

function calculateCPI(){
 let base=80;

 switch(washMode.value){
  case "eco": base+=8; break;
  case "intensive": base-=6; break;
  case "glass": base+=4; break;
  case "ai": base+=10; break;
 }

 switch(loadSize.value){
  case "light": base+=5; break;
  case "heavy": base-=5; break;
 }

 return Math.max(60,Math.min(base,100));
}

function updateUI(){
 soilNow.textContent=Math.round(soil)+" / 100";
 soilBar.style.width=soil+"%";

 const cpi=calculateCPI();
 cpiNow.textContent=cpi;

 if(cpi>=90) cpiBand.textContent="Exceptional";
 else if(cpi>=80) cpiBand.textContent="High Performance";
 else if(cpi>=70) cpiBand.textContent="Standard";
 else cpiBand.textContent="Adaptive Boost";
}

function runStep(){

 if(!cycleActive) return;

 soil-=Math.random()*2+1;

 if(soil<5){
  soil=5;
  stopCycle();
 }

 updateUI();
}

function startCycle(){

 if(cycleActive) return;

 cycleActive=true;
 soil=80;

 logLine("Cycle started");
 updateUI();

 timer=setInterval(runStep,900);
}

function stopCycle(){

 if(!cycleActive) return;

 cycleActive=false;

 clearInterval(timer);

 const cpi=calculateCPI();
 cpiNow.textContent=cpi;

 logLine("Cycle finished — CPI "+cpi);
}

function resetMemory(){
 soil=80;
 cpiNow.textContent="—";
 soilNow.textContent="—";
 soilBar.style.width="0%";
 cpiBand.textContent="Idle";
 log.innerHTML="";
}

startBtn.addEventListener("click",startCycle);
stopBtn.addEventListener("click",stopCycle);
resetBtn.addEventListener("click",resetMemory);

});
</script>

</body>
</html>
